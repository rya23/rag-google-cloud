services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../data/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-ragdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  embedding-service:
    build:
      context: ../embedding-service
    container_name: rag-embedding
    env_file:
      - ../.env
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  reranker-service:
    build:
      context: ../reranker-service
    container_name: rag-reranker
    env_file:
      - ../.env
    ports:
      - "8020:8020"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8020/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  orchestrator:
    build:
      context: ../orchestrator
    container_name: rag-orchestrator
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
      reranker-service:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: python:3.11-slim
    container_name: rag-frontend
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: ["python", "-m", "http.server", "3000", "--bind", "0.0.0.0"]
    ports:
      - "3000:3000"

volumes:
  pgdata:
